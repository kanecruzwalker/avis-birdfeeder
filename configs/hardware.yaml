# configs/hardware.yaml
#
# Physical hardware constants for the Avis Raspberry Pi 5 deployment.
# All values are specific to the assembled hardware — do not change without
# re-validating the physical setup and re-running calibration if applicable.
#
# Tunable values (lighting, crop zone) should be adjusted after mounting
# the cameras at the feeder. All other values reflect fixed hardware specs.
#
# Hardware:
#   Compute:     Raspberry Pi 5 (8GB)
#   Accelerator: Hailo AI HAT+ (HAILO8L, firmware 4.23.0)
#   Cameras:     2× Pi Camera Module 3 (IMX708 sensor)
#   Microphone:  Fifine USB (hw:2,0)
 
# ── Microphone ────────────────────────────────────────────────────────────────
microphone:
  # Preferred device lookup method: substring match against sounddevice
  # device names. Robust to USB enumeration order changes across reboots.
  # Set this to a distinctive fragment of the device name (verify on Pi
  # with: python -c "import sounddevice; print(sounddevice.query_devices())").
  # Leave unset (or empty string) to use device_index directly.
  device_name: "USB PnP Audio Device"

  # Fallback sounddevice device index used if device_name is unset or does
  # not match any connected device. sounddevice enumeration is not stable
  # across reboots — rely on device_name above for deployed hardware.
  # Confirmed index 0 on the deployed Pi when the Fifine is the only audio
  # device present. Different indices may be correct on other machines.
  device_index: 0
 
  # Native sample rate reported by the device — no resampling needed
  # BirdNET expects 48000 Hz — this matches exactly
  sample_rate: 48000
 
  # Mono input — device reports 1 input channel natively
  channels: 1
 
  # Duration of each capture window in seconds.
  # BirdNET was trained on 3-second clips — do not change without retraining.
  # Must match audio.window_seconds in thresholds.yaml.
  window_seconds: 3.0
 
  # dtype for sounddevice capture buffer
  dtype: "float32"
 
# ── Cameras ───────────────────────────────────────────────────────────────────
cameras:
  # Primary camera — left position in stereo pair, main classification feed
  # picamera2 index confirmed via libcamera-hello --list-cameras on Pi
  primary_index: 0
 
  # Secondary camera — right position in stereo pair, secondary classification feed
  secondary_index: 1
 
  # Native capture resolution and framerate.
  # 1536x864 @ 120fps is the highest-framerate mode on IMX708.
  # Chosen for responsiveness — fast-moving birds are captured cleanly.
  capture_width: 1536
  capture_height: 864
  capture_fps: 120
 
  # EfficientNet-B0 classification input resolution.
  # Frames are cropped to feeder_crop then downsampled to this size.
  classification_width: 224
  classification_height: 224
 
  # ── Stereo geometry ────────────────────────────────────────────────────────
  # Fixed at mount time — do not change after stereo calibration is run.
  # 8cm horizontal baseline is optimal for feeder distances (~30-60cm).
  # Cameras must be mounted parallel (not toed in), horizontal pair.
  stereo:
    baseline_cm: 8.0          # center-to-center lens separation in cm
    orientation: "horizontal" # left-right pair — OpenCV stereo default
 
    # Path to stereo calibration matrices (output of scripts/calibrate_stereo.py)
    # File does not exist until Phase 6 calibration is run.
    # StereoEstimator checks for this file and raises CalibrationRequired if absent.
    calibration_path: "models/stereo/calibration.npz"
 
  # ── Feeder crop zone ───────────────────────────────────────────────────────
  # Pixel region of interest on the full 1536x864 capture frame.
  # Crop is applied before downsampling to classification resolution.
  # This constrains classification to the perch zone where a single bird
  # typically sits, reducing multi-bird scene ambiguity (Phase 5 limitation).
  #
  # Tune these values after mounting cameras at the feeder:
  #   1. Run scripts/capture_test_frame.py to save a test frame to disk
  #   2. Open in any image viewer and note pixel coordinates of perch center
  #   3. Set x/y so the crop is centered on the perch
  # Default values assume centered feeder perch — adjust after mounting.
  feeder_crop:
    x: 568        # left edge of crop region (pixels from left of frame)
    y: 232        # top edge of crop region (pixels from top of frame)
    width: 400    # crop width in pixels (400px → downsampled to 224px)
    height: 400   # crop height in pixels


  # ── Per-camera crop overrides (optional) ──────────────────────────────────
  # If present, these override feeder_crop for the respective camera.
  # Useful when cameras are mounted at slightly different angles.
  # If absent, both cameras use the shared feeder_crop values above.
  # feeder_crop_cam0:
  #   x: 540
  #   y: 180
  #   width: 600
  #   height: 500
  # feeder_crop_cam1:
  #   x: 500
  #   y: 180
  #   width: 600
  #   height: 500


 
  # ── Motion detection ──────────────────────────────────────────────────────
  # Minimum mean absolute pixel difference from background model to trigger
  # classification. Prevents classifying empty frames between bird visits.
  # Range [0.0, 1.0] on float32 normalized frames.
  # Tune higher in windy conditions (foliage movement causes false triggers).
  motion_threshold: 0.05
 
  # Number of frames averaged to build the background model.
  # Higher = more stable background, slower to adapt to lighting changes.
  background_history: 30
 
# ── Hailo AI HAT+ ─────────────────────────────────────────────────────────────
hailo:
  # PCIe device address confirmed via hailortcli scan on Pi
  device_address: "0001:01:00.0"
 
  # Architecture — HAILO8L (26 TOPS)
  architecture: "HAILO8L"
 
  # Firmware version confirmed via hailortcli fw-control identify
  firmware_version: "4.23.0"
 
  # Compiled model paths (.hef format — output of scripts/compile_hailo.py)
  # These files do not exist until Hailo compilation is run in Phase 5.
  # Classifiers check for .hef existence and fall back to CPU if absent.
  models:
    visual_hef: "models/visual/efficientnet_b0_avis_v2.hef"
    audio_hef:  "models/visual/audio_birdnet.hef"
    yolo_hef:   "/usr/share/hailo-models/yolov8s_h8l.hef"

 
  # Whether to attempt Hailo inference when .hef files are present.
  # Set false to force CPU inference regardless of .hef availability.
  # Useful for debugging classification accuracy independently of Hailo.
  enabled: false

  detection_mode: "fixed_crop" # "fixed_crop" or "yolo" - set "yolo" locally on Pi

  # Adaptive crop parameters (only used when detection_mode = "yolo")
  # When the YOLO bbox dimension is smaller than adaptive_min_bbox_dim on
  # either axis, the classifier input is expanded to a centered square of
  # adaptive_centered_size × adaptive_centered_size pixels. Large bboxes
  # (both dims >= adaptive_min_bbox_dim) use the tight YOLO crop directly.
  #
  # These values are tuned for a feeder camera setup where small birds
  # (finches, sparrows) produce bboxes ~120-200 px and large birds (crows,
  # doves) produce bboxes ~300+ px. The 300 px centered square gives the
  # classifier enough environment context to match NABirds training
  # distribution.
  adaptive_min_bbox_dim: 250
  adaptive_centered_size: 300


# ── Bird-presence detector configuration (Branch 2, Phase 8) ─────────────────
# Controls the gate that runs between motion detection and species
# classification. On motion-triggered frames, the detector asks "is there
# a bird in this frame?" — if no, the classifier is skipped and a
# gate_reason="no_bird_detected" observation is logged.
#
# This is the primary Phase 8 fix for empty-feeder noise dispatch. See
# docs/investigations/hailo-2026-04-22.md for the full investigation.
detector:
  # Which backend to use for bird-presence detection.
  #   "cpu"   — ultralytics YOLOv8s on CPU (default, available now).
  #             ~1000ms inference on Pi 5, acceptable given 8s cycle interval.
  #   "hailo" — Hailo NPU inference. Deferred to Branch 5 (post-report).
  #             Raises NotImplementedError if selected today.
  backend: "cpu"

  # CPU backend settings (used when backend: "cpu")
  cpu:
    # Path or name passed to ultralytics.YOLO(). "yolov8s.pt" is resolved
    # by ultralytics to its default download location (~22MB download on
    # first use). Pin to a local path for reproducibility if needed.
    model_path: "yolov8s.pt"
    # Minimum YOLO confidence to accept a bird detection. 0.25 is a
    # reasonable default for backyard birds. Raise to reduce false
    # positives (but risk missing small/distant birds). Lower to catch
    # more birds (but accept more noise).
    confidence_threshold: 0.25
    # YOLO input image size. 640 is the YOLOv8s canonical training size.
    imgsz: 640

  # Hailo backend settings (deferred to Branch 5 — not yet consumed)
  hailo:
    hef_path: "models/detector/yolov8s_bird.hef"  # custom HEF, future work
    score_threshold: 0.25









# ── YOLO detection ─────────────────────────────────────────────────────────
  yolo:
    score_threshold: 0.25
    max_proposals: 10
    min_bird_confidence: 0.25


orchestrator:
  window_minutes: 30
  ab_modes: ["fixed_crop", "yolo"]
  summary_hour_utc: 20
  startup_delay_seconds: 10
  push_window_summaries: false
  daily_summaries_dir: "logs/daily_summaries"


llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.2
  max_tokens: 512
  enabled: true
  fallback_to_schedule: true