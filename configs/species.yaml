# configs/species.yaml
#
# San Diego region bird species list.
# This file is the single source of truth for which species the system
# recognizes. All dataset filtering, model output labels, and UI display
# names are derived from this list.
#
# Format per entry:
#   code:            4-letter banding code (AOU standard)
#   common_name:     human-readable name
#   scientific_name: binomial Latin name
#
# Source: eBird San Diego County frequency data, San Diego Field Ornithologists
# checklist, and Greg Gillson's San Diego backyard bird surveys.
# Criteria: year-round or seasonal resident with regular feeder/backyard
# presence and sufficient XC recordings for training (50+ expected).

species:
  # ── Year-round residents ────────────────────────────────────────────────
  - code: HOFI
    common_name: "House Finch"
    scientific_name: "Haemorhous mexicanus"

  - code: MODO
    common_name: "Mourning Dove"
    scientific_name: "Zenaida macroura"

  - code: ANHU
    common_name: "Anna's Hummingbird"
    scientific_name: "Calypte anna"

  - code: CAVI
    common_name: "California Scrub-Jay"
    scientific_name: "Aphelocoma californica"

  - code: MOCH
    common_name: "Northern Mockingbird"
    scientific_name: "Mimus polyglottos"

  - code: AMRO
    common_name: "American Robin"
    scientific_name: "Turdus migratorius"

  - code: SOSP
    common_name: "Song Sparrow"
    scientific_name: "Melospiza melodia"

  - code: LEGO
    common_name: "Lesser Goldfinch"
    scientific_name: "Spinus psaltria"

  - code: DOWO
    common_name: "Downy Woodpecker"
    scientific_name: "Dryobates pubescens"

  - code: WREN
    common_name: "House Wren"
    scientific_name: "Troglodytes aedon"

  - code: AMCR
    common_name: "American Crow"
    scientific_name: "Corvus brachyrhynchos"

  - code: SPTO
    common_name: "Spotted Towhee"
    scientific_name: "Pipilo maculatus"

  - code: BLPH
    common_name: "Black Phoebe"
    scientific_name: "Sayornis nigricans"

  - code: HOSP
    common_name: "House Sparrow"
    scientific_name: "Passer domesticus"

  - code: EUST
    common_name: "European Starling"
    scientific_name: "Sturnus vulgaris"

  # ── Seasonal / common visitors ──────────────────────────────────────────
  - code: WCSP
    common_name: "White-crowned Sparrow"
    scientific_name: "Zonotrichia leucophrys"

  - code: HOORI
    common_name: "Hooded Oriole"
    scientific_name: "Icterus cucullatus"

  - code: WBNU
    common_name: "White-breasted Nuthatch"
    scientific_name: "Sitta carolinensis"

  - code: OCWA
    common_name: "Orange-crowned Warbler"
    scientific_name: "Leiothlypis celata"

  - code: YRUM
    common_name: "Yellow-rumped Warbler"
    scientific_name: "Setophaga coronata"